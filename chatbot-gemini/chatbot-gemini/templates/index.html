<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendShop — Customer Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Fraunces:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #1a1a2e;
      --accent: #e94560;
      --accent-soft: #ff6b8a;
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-2: #f0efe9;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a2e;
      --text-muted: #6b6b80;
      --radius: 18px;
      --font: 'Instrument Sans', system-ui, sans-serif;
      --font-display: 'Fraunces', Georgia, serif;
    }

    body { font-family: var(--font); background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      background: var(--brand);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-brand { display: flex; align-items: center; gap: 12px; }

    .brand-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 18px; color: #fff; font-weight: 600;
    }

    .brand-name { font-family: var(--font-display); font-size: 20px; color: #fff; letter-spacing: -0.3px; }

    .header-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.6); }

    .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }

    .quick-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; gap: 8px; flex-wrap: wrap;
      flex-shrink: 0;
    }

    .quick-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px; font-family: var(--font); color: var(--text);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }

    .quick-btn:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

    .chat-container {
      flex: 1; overflow-y: auto;
      padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

    .message { display: flex; gap: 10px; max-width: 680px; animation: fadeUp 0.25s ease; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .avatar.bot { background: var(--brand); color: #fff; }
    .avatar.user { background: var(--accent); color: #fff; }

    .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 14.5px; line-height: 1.65; max-width: 520px; }
    .message.bot .bubble { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { font-weight: 600; }

    .timestamp { font-size: 11px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }
    .message.user .timestamp { text-align: right; }

    .typing-indicator { display: none; gap: 10px; max-width: 680px; align-items: center; }
    .typing-indicator.visible { display: flex; }

    .typing-dots {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); border-bottom-left-radius: 4px;
      padding: 14px 18px; display: flex; gap: 5px; align-items: center;
    }

    .typing-dots span { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .welcome-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px 24px; max-width: 460px;
      animation: fadeUp 0.3s ease;
    }
    .welcome-card .logo { font-family: var(--font-display); font-size: 28px; color: var(--brand); margin-bottom: 8px; }
    .welcome-card .logo span { color: var(--accent); }
    .welcome-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 6px 12px;
      font-size: 12.5px; color: var(--text); cursor: pointer; transition: all 0.15s;
    }
    .chip:hover { background: var(--brand); color: #fff; border-color: transparent; }

    .input-area {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 16px 24px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1; background: var(--surface-2);
      border: 1.5px solid var(--border); border-radius: 14px;
      padding: 10px 14px; display: flex; align-items: flex-end; gap: 8px;
      transition: border-color 0.15s;
    }
    .input-wrapper:focus-within { border-color: var(--accent); background: var(--surface); }

    #user-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: var(--font); font-size: 14.5px; color: var(--text);
      resize: none; max-height: 120px; min-height: 22px; line-height: 1.5;
    }
    #user-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px; height: 40px; background: var(--accent);
      border: none; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-soft); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .reset-btn {
      padding: 10px 14px; background: transparent;
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; font-size: 12px; color: var(--text-muted);
      font-family: var(--font); transition: all 0.15s; white-space: nowrap;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #dc2626; color: #fff;
      padding: 10px 20px; border-radius: 10px; font-size: 13px;
      opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .quick-bar { display: none; }
      header, .chat-container, .input-area { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <div class="brand-icon">T</div>
      <span class="brand-name">TrendShop</span>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span>Trend Assistant online</span>
    </div>
  </header>

  <div class="quick-bar">
    <button class="quick-btn" onclick="quickSend('How can I check my order status?')">📦 Track order</button>
    <button class="quick-btn" onclick="quickSend('How do returns and exchanges work?')">↩️ Returns & exchanges</button>
    <button class="quick-btn" onclick="quickSend('Where is my package?')">🚚 Shipping tracking</button>
    <button class="quick-btn" onclick="quickSend('Which products are currently in stock?')">🛍️ Stock availability</button>
    <button class="quick-btn" onclick="quickSend('I would like to speak with a human representative')">👤 Human agent</button>
  </div>

  <div class="chat-container" id="chat">

    <div class="welcome-card">
      <div class="logo">Trend<span>Shop</span></div>
      <p>Hi there! I'm <strong>Trend Assistant</strong> — here to help you with orders, returns, and product questions. How can I help you today?</p>
      <div class="welcome-chips">
        <span class="chip" onclick="quickSend('Show me order TS-10042')">🔍 Order TS-10042</span>
        <span class="chip" onclick="quickSend('Look up orders for alice.johnson@email.com')">📧 Look up by email</span>
        <span class="chip" onclick="quickSend('Is the Nike Air Max 270 in stock?')">👟 Nike stock</span>
        <span class="chip" onclick="quickSend('Can I return my Levi\'s jeans?')">↩️ Return eligibility</span>
      </div>
    </div>

    <div class="typing-indicator" id="typing">
      <div class="avatar bot">✦</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

  </div>

  <div class="input-area">
    <button class="reset-btn" onclick="resetChat()" title="Reset conversation">↺ Reset</button>
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Type your message..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typing = document.getElementById('typing');

    function getTime() {
      return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    function formatBotText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:13px">$1</code>')
        .split('\n')
        .map(line => line.trim() ? `<p>${line}</p>` : '')
        .join('');
    }

    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const avatarIcon = role === 'bot' ? '✦' : '👤';
      const bubbleContent = role === 'bot' ? formatBotText(text) : `<p>${text}</p>`;
      div.innerHTML = `
        <div class="avatar ${role}">${avatarIcon}</div>
        <div>
          <div class="bubble">${bubbleContent}</div>
          <div class="timestamp">${getTime()}</div>
        </div>`;
      chat.insertBefore(div, typing);
      scrollToBottom();
    }

    function scrollToBottom() { chat.scrollTop = chat.scrollHeight; }
    function showTyping() { typing.classList.add('visible'); scrollToBottom(); }
    function hideTyping() { typing.classList.remove('visible'); }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      input.value = '';
      autoResize(input);
      sendBtn.disabled = true;
      appendMessage('user', text);
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        hideTyping();
        if (data.error) showToast('Error: ' + data.error);
        else appendMessage('bot', data.response);
      } catch (err) {
        hideTyping();
        showToast('Connection error. Please try again.');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    async function resetChat() {
      await fetch('/reset', { method: 'POST' });
      chat.querySelectorAll('.message').forEach(m => m.remove());
      const card = document.createElement('div');
      card.className = 'welcome-card';
      card.innerHTML = `<div class="logo">Trend<span>Shop</span></div><p>Conversation reset. How can I help you?</p>`;
      chat.insertBefore(card, typing);
    }

    function quickSend(text) { input.value = text; sendMessage(); }
    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

    input.focus();
  </script>

</body>
</html>
